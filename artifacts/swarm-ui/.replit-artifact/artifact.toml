kind = "web"
previewPath = "/"
title = "Swarm Agent Dashboard"
version = "1.0.0"
id = "artifacts/swarm-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19541

[services.development]
run = "pnpm --filter @workspace/swarm-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/swarm-ui", "run", "build" ]
publicDir = "artifacts/swarm-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19541"
BASE_PATH = "/"
