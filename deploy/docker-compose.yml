version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: swarm_ctrl_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: swarm
      POSTGRES_PASSWORD: swarm_secret_change_me
      POSTGRES_DB: swarm_ctrl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swarm -d swarm_ctrl"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
