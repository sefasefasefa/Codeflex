openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Swarm Agent Orchestration API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: projects
  - name: agents
  - name: runs
  - name: snapshots
  - name: workspace
  - name: stats
  - name: cli
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project with full memory context
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          description: Not found
    put:
      operationId: updateProject
      tags: [projects]
      summary: Update project metadata
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project and all its data
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /projects/{projectId}/memory:
    patch:
      operationId: updateProjectMemory
      tags: [projects]
      summary: Append facts to project memory context
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryPatch"
      responses:
        "200":
          description: Updated memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemory"

  /projects/{projectId}/files:
    get:
      operationId: listProjectFiles
      tags: [projects]
      summary: List all files created/modified by agents for this project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectFile"

  /projects/{projectId}/files/{fileId}:
    get:
      operationId: getProjectFile
      tags: [projects]
      summary: Get a project file with full version history
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File with history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectFileDetail"
        "404":
          description: Not found

  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List all agent definitions
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"
    post:
      operationId: createAgent
      tags: [agents]
      summary: Create or register a new agent definition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"

  /agents/{agentId}:
    get:
      operationId: getAgent
      tags: [agents]
      summary: Get agent details
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Not found
    put:
      operationId: updateAgent
      tags: [agents]
      summary: Update agent configuration
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
    delete:
      operationId: deleteAgent
      tags: [agents]
      summary: Delete an agent definition
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /runs:
    get:
      operationId: listRuns
      tags: [runs]
      summary: List all pipeline runs
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [queued, running, completed, failed, cancelled]
        - name: projectId
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Run list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Run"
    post:
      operationId: createRun
      tags: [runs]
      summary: Start a new pipeline run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"

  /runs/{runId}:
    get:
      operationId: getRun
      tags: [runs]
      summary: Get run details with logs
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Run with logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunDetail"
        "404":
          description: Not found
    delete:
      operationId: cancelRun
      tags: [runs]
      summary: Cancel a running pipeline
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"

  /snapshots:
    get:
      operationId: listSnapshots
      tags: [snapshots]
      summary: List all snapshots
      responses:
        "200":
          description: Snapshot list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Snapshot"
    post:
      operationId: createSnapshot
      tags: [snapshots]
      summary: Create a manual snapshot of the workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnapshotInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snapshot"

  /snapshots/{snapshotId}:
    get:
      operationId: getSnapshot
      tags: [snapshots]
      summary: Get snapshot details
      parameters:
        - name: snapshotId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snapshot"
    delete:
      operationId: deleteSnapshot
      tags: [snapshots]
      summary: Delete a snapshot
      parameters:
        - name: snapshotId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /snapshots/{snapshotId}/rollback:
    post:
      operationId: rollbackSnapshot
      tags: [snapshots]
      summary: Rollback workspace to a snapshot
      parameters:
        - name: snapshotId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rolled back
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snapshot"

  /workspace:
    get:
      operationId: listWorkspaceFiles
      tags: [workspace]
      summary: List workspace project files
      parameters:
        - name: project
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: File tree
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceFile"

  /workspace/file:
    get:
      operationId: getWorkspaceFile
      tags: [workspace]
      summary: Get file content
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceFileContent"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get system stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStats"

  /activity:
    get:
      operationId: listActivity
      tags: [stats]
      summary: Recent activity feed
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Activity entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"

  /cli:
    post:
      operationId: executeCliCommand
      tags: [cli]
      summary: Execute a CLI command against a project (REPL)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CliCommand"
      responses:
        "200":
          description: Command result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CliResult"

  /cli/history:
    get:
      operationId: getCliHistory
      tags: [cli]
      summary: Get command history for a project
      parameters:
        - name: projectId
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Command history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CliHistoryEntry"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ProjectMemoryFact:
      type: object
      required: [key, value, source, createdAt]
      properties:
        key:
          type: string
        value:
          type: string
        source:
          type: string
        createdAt:
          type: string

    ProjectMemory:
      type: object
      required: [facts, summary, lastUpdated]
      properties:
        facts:
          type: array
          items:
            $ref: "#/components/schemas/ProjectMemoryFact"
        summary:
          type: string
        lastUpdated:
          type: string

    Project:
      type: object
      required: [id, name, description, status, totalRuns, totalFiles, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [initialized, active, paused, completed]
        stack:
          type: ["string", "null"]
        totalRuns:
          type: integer
        totalFiles:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string

    ProjectDetail:
      type: object
      required: [id, name, description, status, totalRuns, totalFiles, createdAt, updatedAt, memory, recentRuns]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [initialized, active, paused, completed]
        stack:
          type: ["string", "null"]
        totalRuns:
          type: integer
        totalFiles:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
        memory:
          $ref: "#/components/schemas/ProjectMemory"
        recentRuns:
          type: array
          items:
            $ref: "#/components/schemas/Run"

    ProjectInput:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
        description:
          type: string
        stack:
          type: string

    ProjectUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [initialized, active, paused, completed]
        stack:
          type: string

    MemoryPatch:
      type: object
      required: [facts]
      properties:
        facts:
          type: array
          items:
            type: object
            required: [key, value, source]
            properties:
              key:
                type: string
              value:
                type: string
              source:
                type: string
        summary:
          type: string

    ProjectFile:
      type: object
      required: [id, projectId, path, language, operation, version, agentKey, runId, sizeBytes, createdAt]
      properties:
        id:
          type: string
        projectId:
          type: string
        path:
          type: string
        language:
          type: string
        operation:
          type: string
          enum: [create, update, delete]
        version:
          type: integer
        agentKey:
          type: string
        runId:
          type: string
        sizeBytes:
          type: integer
        createdAt:
          type: string

    ProjectFileVersion:
      type: object
      required: [version, content, agentKey, runId, operation, createdAt]
      properties:
        version:
          type: integer
        content:
          type: string
        agentKey:
          type: string
        runId:
          type: string
        operation:
          type: string
          enum: [create, update, delete]
        createdAt:
          type: string

    ProjectFileDetail:
      type: object
      required: [id, projectId, path, language, operation, version, agentKey, runId, sizeBytes, content, history, createdAt]
      properties:
        id:
          type: string
        projectId:
          type: string
        path:
          type: string
        language:
          type: string
        operation:
          type: string
          enum: [create, update, delete]
        version:
          type: integer
        agentKey:
          type: string
        runId:
          type: string
        sizeBytes:
          type: integer
        content:
          type: string
        history:
          type: array
          items:
            $ref: "#/components/schemas/ProjectFileVersion"
        createdAt:
          type: string

    Agent:
      type: object
      required: [id, key, role, modelName, temperature, description, createdAt]
      properties:
        id:
          type: string
        key:
          type: string
        role:
          type: string
        modelName:
          type: string
        temperature:
          type: number
        description:
          type: string
        maxRetries:
          type: integer
        createdAt:
          type: string

    AgentInput:
      type: object
      required: [key, role, modelName, temperature, description]
      properties:
        key:
          type: string
        role:
          type: string
        modelName:
          type: string
        temperature:
          type: number
        description:
          type: string
        maxRetries:
          type: integer

    AgentUpdate:
      type: object
      properties:
        role:
          type: string
        modelName:
          type: string
        temperature:
          type: number
        description:
          type: string
        maxRetries:
          type: integer

    Run:
      type: object
      required: [id, projectId, projectName, prompt, status, agentKeys, parallelCount, createdAt]
      properties:
        id:
          type: string
        projectId:
          type: ["string", "null"]
        projectName:
          type: string
        prompt:
          type: string
        status:
          type: string
          enum: [queued, running, completed, failed, cancelled]
        agentKeys:
          type: array
          items:
            type: string
        parallelCount:
          type: integer
        snapshotId:
          type: ["string", "null"]
        filesWritten:
          type: integer
        completedAt:
          type: ["string", "null"]
        createdAt:
          type: string

    RunDetail:
      allOf:
        - $ref: "#/components/schemas/Run"
        - type: object
          required: [logs]
          properties:
            logs:
              type: array
              items:
                $ref: "#/components/schemas/RunLog"

    RunInput:
      type: object
      required: [projectName, prompt, agentKeys]
      properties:
        projectId:
          type: string
        projectName:
          type: string
        prompt:
          type: string
        agentKeys:
          type: array
          items:
            type: string
        parallelCount:
          type: integer
        ollamaUrl:
          type: string

    RunLog:
      type: object
      required: [id, runId, agentKey, level, message, createdAt]
      properties:
        id:
          type: string
        runId:
          type: string
        agentKey:
          type: string
        level:
          type: string
          enum: [info, warn, error, think, output, file]
        message:
          type: string
        thinkTrace:
          type: ["string", "null"]
        filePath:
          type: ["string", "null"]
        createdAt:
          type: string

    Snapshot:
      type: object
      required: [id, projectName, label, checkpointId, sizeBytes, createdAt]
      properties:
        id:
          type: string
        projectName:
          type: string
        label:
          type: string
        checkpointId:
          type: string
        sizeBytes:
          type: integer
        runId:
          type: ["string", "null"]
        agentKey:
          type: ["string", "null"]
        createdAt:
          type: string

    SnapshotInput:
      type: object
      required: [projectName, label]
      properties:
        projectName:
          type: string
        label:
          type: string

    WorkspaceFile:
      type: object
      required: [path, name, type]
      properties:
        path:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [file, directory]
        size:
          type: ["integer", "null"]
        children:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/WorkspaceFile"

    WorkspaceFileContent:
      type: object
      required: [path, content, lines]
      properties:
        path:
          type: string
        content:
          type: string
        lines:
          type: integer

    SystemStats:
      type: object
      required: [totalAgents, totalProjects, activeRuns, completedRuns, failedRuns, totalSnapshots, totalLogs, totalFiles, recentThroughput]
      properties:
        totalAgents:
          type: integer
        totalProjects:
          type: integer
        activeRuns:
          type: integer
        completedRuns:
          type: integer
        failedRuns:
          type: integer
        totalSnapshots:
          type: integer
        totalLogs:
          type: integer
        totalFiles:
          type: integer
        recentThroughput:
          type: number

    ActivityEntry:
      type: object
      required: [id, type, message, entityId, entityType, createdAt]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [run_started, run_completed, run_failed, snapshot_created, snapshot_rolled_back, agent_created, agent_updated, project_created, file_written, memory_updated]
        message:
          type: string
        entityId:
          type: string
        entityType:
          type: string
          enum: [run, snapshot, agent, project, file]
        createdAt:
          type: string

    CliCommand:
      type: object
      required: [command]
      properties:
        command:
          type: string
        projectId:
          type: string
        projectName:
          type: string

    CliResult:
      type: object
      required: [id, command, output, exitCode, durationMs, createdAt]
      properties:
        id:
          type: string
        command:
          type: string
        output:
          type: string
        exitCode:
          type: integer
        durationMs:
          type: integer
        projectId:
          type: ["string", "null"]
        runId:
          type: ["string", "null"]
        createdAt:
          type: string

    CliHistoryEntry:
      type: object
      required: [id, command, output, exitCode, durationMs, createdAt]
      properties:
        id:
          type: string
        command:
          type: string
        output:
          type: string
        exitCode:
          type: integer
        durationMs:
          type: integer
        projectId:
          type: ["string", "null"]
        createdAt:
          type: string
